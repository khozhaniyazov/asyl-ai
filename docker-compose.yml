version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: logoped_user
      POSTGRES_PASSWORD: logoped_password
      POSTGRES_DB: asyl_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: asyl_admin
      MINIO_ROOT_PASSWORD: asyl_secret_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 asyl_admin asyl_secret_password;
      /usr/bin/mc mb myminio/logoped-sessions;
      /usr/bin/mc anonymous set private myminio/logoped-sessions;
      exit 0;
      "

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://logoped_user:logoped_password@db:5432/asyl_ai_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=\
      - AWS_ACCESS_KEY_ID=asyl_admin
      - AWS_SECRET_ACCESS_KEY=asyl_secret_password
      - AWS_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=logoped-sessions
    depends_on:
      - db
      - minio
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
