version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: sandar_user
      POSTGRES_PASSWORD: sandar_password
      POSTGRES_DB: sandar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: sandar_admin
      MINIO_ROOT_PASSWORD: sandar_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 sandar_admin sandar_secret;
      /usr/bin/mc mb myminio/sandar-uploads;
      /usr/bin/mc anonymous set private myminio/sandar-uploads;
      exit 0;
      "

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sandar_user:sandar_password@db:5432/sandar_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=\
      - AWS_ACCESS_KEY_ID=sandar_admin
      - AWS_SECRET_ACCESS_KEY=sandar_secret
      - AWS_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=sandar-uploads
    depends_on:
      - db
      - minio
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
